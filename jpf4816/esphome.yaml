defaults:
    modbus_master: modbus_master
    name: ${device_id}
    update_interval: 30s
    command_throttle: 100ms
    rpm_filter_window: 3
    # Initial value of the per-device auto-mode flag (NVS-backed, only used
    # on first boot of a fresh device — subsequent boots restore from NVS).
    # "false" -> manual mode by default. Backward-compatible with setups
    #            that drive the fan via external lambdas using
    #            id(${device_id}_speed_percentage).make_call() (e.g. mast-rack).
    # "true"  -> temperature-PID mode by default (register 0x0003 = 0xFFFF).
    #            Recommended when ESPHome is the only master and you want
    #            the JPF4816 to self-regulate.
    auto_mode_initial: "false"
    # How often (seconds) we re-assert auto mode while it's enabled. This
    # heals accidental external writes to 0x0003. Set high or use "0s" to
    # rely on a single boot-time write.
    auto_mode_reassert_interval: 60s

packages:
  online_sensor: !include
    file: ../modbus_online/esphome.yaml
    vars:
      modbus_id: ${device_id}_modbus
      device_id: ${device_id}
      name: ${name}

# JPF4816 Fan Speed Controller — full register map
# Datasheet: 成都兢志成电子科技有限公司 (Chengdu Jingzhicheng)
#
# Reg    | Description                          | Access
# -------|--------------------------------------|--------
# 0x0000 | Temperature (+40 offset)             | R
# 0x0001 | Fan status bitmask                   | R
# 0x0002 | Modbus address (1–254)               | R/W
# 0x0003 | Serial forced fan speed % (0–100, 0xFFFF=release) | R/W
# 0x0004 | Combined start/full-speed temp (hi=start, lo=full) | R/W
# 0x0005 | Governor mode (0=off, 1=min-speed)   | R/W
# 0x0006 | Number of fans (0–4, 0=no fault detect) | R/W
# 0x0007 | Fan 1 RPM                            | R
# 0x0008 | Fan 2 RPM                            | R
# 0x0009 | Fan 3 RPM                            | R
# 0x000A | Fan 4 RPM                            | R
# 0x000B | PWM frequency (0–5, default 5=25kHz) | R/W
# 0x000C | Fan start temperature (+40 offset)   | R/W
# 0x000D | Fan full-speed temperature (+40 offset) | R/W
# 0x000E | Fan fault codes bitmask              | R
# 0x0020 | Reset/restart (write 0x00AA)         | W

globals:
  - id: ${device_id}_slave_id
    type: int
    restore_value: true
    initial_value: "(${slave_id})"

  # Auto/Manual mode flag (single source of truth, persisted in NVS).
  # The JPF4816 does NOT expose its mode in any register: reading 0x0003
  # always returns the current PWM % regardless of mode (manual §8.2/§9.6),
  # so we track the intent locally on the ESP and re-assert it on boot
  # and periodically.
  - id: ${device_id}_auto_mode
    type: bool
    restore_value: true
    initial_value: ${auto_mode_initial}

esphome:
  on_boot:
    # 1. Re-apply slave address from NVS (early — before first transaction).
    - priority: -5
      then:
        - lambda: |-
            int addr = id(${device_id}_slave_id);
            if (addr > 0 && addr <= 254) {
              id(${device_id}_modbus).set_address(addr);
              ESP_LOGI("modbus", "${device_id}: slave address set from NVS: %d", addr);
            }
    # 2. Re-assert auto/manual mode. JPF4816 itself reverts to temperature
    #    control on its own power-cycle, so without this our NVS flag would
    #    silently disagree with reality after a full power-down. Run late,
    #    after modbus/uart/wifi are fully up.
    - priority: -200
      then:
        - delay: 10s
        - lambda: |-
            uint16_t val = id(${device_id}_auto_mode)
                            ? (uint16_t) 0xFFFF
                            : (uint16_t) 0x000A;
            auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
              id(${device_id}_modbus), 0x0003, val);
            id(${device_id}_modbus)->queue_command(cmd);
            ESP_LOGI("modbus", "${device_id}: boot mode re-assert: %s",
                     id(${device_id}_auto_mode) ? "AUTO (0xFFFF)" : "MANUAL (10%)");

# Periodic self-healing: re-assert 0xFFFF while we are in auto mode, so any
# external write to 0x0003 (e.g. accidental UI poke at the internal raw
# number) cannot keep us stuck in manual.
interval:
  - interval: ${auto_mode_reassert_interval}
    then:
      - if:
          condition:
            lambda: "return id(${device_id}_auto_mode);"
          then:
            - lambda: |-
                auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
                  id(${device_id}_modbus), 0x0003, (uint16_t) 0xFFFF);
                id(${device_id}_modbus)->queue_command(cmd);

modbus_controller:
  - id: ${device_id}_modbus
    address: ${slave_id}
    modbus_id: ${modbus_master}
    setup_priority: -10
    update_interval: ${update_interval}
    command_throttle: ${command_throttle}
    offline_skip_updates: 5
    max_cmd_retries: 2

# ── Sensors (read-only registers) ─────────────────────────────────────────────

sensor:
  # 0x0000 — Current temperature (read only, raw value has +40 offset)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Temperature"
    register_type: holding
    address: 0x0000
    value_type: U_WORD
    unit_of_measurement: "°C"
    filters:
      - lambda: return x - 40;

  # 0x0001 — Fan status bitmask as raw value (read only)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan Status"
    register_type: holding
    address: 0x0001
    value_type: U_WORD

  # 0x0002 — Modbus address register (internal, keeps batch read continuous 0x0000–0x000E)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    id: ${device_id}_device_addr_reg
    internal: true
    register_type: holding
    address: 0x0002
    value_type: U_WORD

  # 0x0004 — Combined start/full-speed temperature (read only view)
  # High byte = start temp, low byte = full-speed temp, both +40 offset
  # Individual R/W control via 0x000C and 0x000D below
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Start+Full Temp Combined Raw"
    register_type: holding
    address: 0x0004
    value_type: U_WORD
    entity_category: diagnostic

  # 0x0007 — Fan 1 RPM (read only)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 1 RPM"
    id: ${device_id}_fan1_rpm
    register_type: holding
    address: 0x0007
    value_type: U_WORD
    unit_of_measurement: "rpm"
    filters:
      - median:
          window_size: ${rpm_filter_window}
          send_every: 1
          send_first_at: 1

  # 0x0008 — Fan 2 RPM (read only)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 2 RPM"
    id: ${device_id}_fan2_rpm
    register_type: holding
    address: 0x0008
    value_type: U_WORD
    unit_of_measurement: "rpm"
    filters:
      - median:
          window_size: ${rpm_filter_window}
          send_every: 1
          send_first_at: 1

  # 0x0009 — Fan 3 RPM (read only)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 3 RPM"
    id: ${device_id}_fan3_rpm
    register_type: holding
    address: 0x0009
    value_type: U_WORD
    unit_of_measurement: "rpm"
    filters:
      - median:
          window_size: ${rpm_filter_window}
          send_every: 1
          send_first_at: 1

  # 0x000A — Fan 4 RPM (read only)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 4 RPM"
    id: ${device_id}_fan4_rpm
    register_type: holding
    address: 0x000A
    value_type: U_WORD
    unit_of_measurement: "rpm"
    filters:
      - median:
          window_size: ${rpm_filter_window}
          send_every: 1
          send_first_at: 1

  # 0x000E — Fan fault codes bitmask as raw value (read only)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan Fault Codes"
    register_type: holding
    address: 0x000E
    value_type: U_WORD

# ── Numbers (read/write registers) ────────────────────────────────────────────

number:
  # Modbus address — writes to NVS (ESP32 side) AND register 0x0002 (JPF4816 device)
  - platform: template
    name: "${name} Modbus Address"
    id: ${device_id}_slave_addr_ui
    min_value: 1
    max_value: 254
    step: 1
    mode: box
    entity_category: config
    lambda: "return id(${device_id}_slave_id);"
    set_action:
      - globals.set:
          id: ${device_id}_slave_id
          value: !lambda "return (int)x;"
      - lambda: |-
          int addr = (int)x;
          // Write new address to JPF4816 register 0x0002 BEFORE changing ESP32 target
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
            id(${device_id}_modbus), 0x0002, addr);
          id(${device_id}_modbus)->queue_command(cmd);
          // Update ESP32 modbus controller target address
          id(${device_id}_modbus)->set_address(addr);
          ESP_LOGI("modbus", "${device_id}: address changed to %d (NVS + device 0x0002)", addr);

  # 0x0003 — Serial forced fan speed % (read/write, 0–100; write 0xFFFF to release)
  #
  # Kept INTERNAL so the user-facing entity is the `${name} Speed` template
  # number below (which honours the auto/manual flag). External scripts that
  # need to drive the fan directly (e.g. mast-rack lambdas) can still use:
  #   id(${device_id}_speed_percentage).make_call().set_value(N).perform();
  # which writes raw % to 0x0003 exactly as before.
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Raw Speed Percentage"
    id: ${device_id}_speed_percentage
    internal: true
    register_type: holding
    address: 0x0003
    value_type: U_WORD
    min_value: 0
    max_value: 100
    step: 1
    unit_of_measurement: "%"

  # User-facing speed slider. Semantics per design:
  #   * In auto mode -> writing the slider re-asserts auto (0xFFFF). The
  #     slider value itself is irrelevant; display always shows the actual
  #     PWM duty reported by the device.
  #   * In manual mode -> the input value is written verbatim to 0x0003.
  - platform: template
    name: "${name} Speed"
    id: ${device_id}_speed_ui
    icon: "mdi:fan"
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    unit_of_measurement: "%"
    optimistic: false
    lambda: |-
      const float v = id(${device_id}_speed_percentage).state;
      if (isnan(v)) return 0.0f;
      // Clamp display to 0..100; device may return 0xFFFF mirror on quirky
      // firmware revisions — treat that as "unknown 0".
      if (v >= 65535.0f - 0.5f) return 0.0f;
      return v;
    set_action:
      - lambda: |-
          uint16_t val = id(${device_id}_auto_mode)
                          ? (uint16_t) 0xFFFF
                          : (uint16_t) x;
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
            id(${device_id}_modbus), 0x0003, val);
          id(${device_id}_modbus)->queue_command(cmd);


  # 0x0005 — Governor mode (internal, used by select)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    id: ${device_id}_governor_raw
    internal: true
    register_type: holding
    address: 0x0005
    value_type: U_WORD
    min_value: 0
    max_value: 1
    step: 1

  # 0x0006 — Number of fans (read/write, 0–4; 0=disable fault detection)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Number of Fans"
    register_type: holding
    address: 0x0006
    value_type: U_WORD
    min_value: 0
    max_value: 4
    step: 1

  # 0x000B — PWM output frequency selection (read/write, 0–5, default 5=25kHz)
  # 0=500Hz, 1=1KHz, 2=2KHz, 3=5KHz, 4=10KHz, 5=25KHz
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    id: ${device_id}_pwm_freq_raw
    internal: true
    name: "${name} PWM Frequency Raw"
    register_type: holding
    address: 0x000B
    value_type: U_WORD
    min_value: 0
    max_value: 5
    step: 1

  # 0x000C — Fan start temperature (read/write, +40 offset)
  # Raw range: 0x0014–0x00A0 (20–160), display: -20°C to 120°C
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Start Temperature"
    register_type: holding
    address: 0x000C
    value_type: U_WORD
    unit_of_measurement: "°C"
    min_value: -20
    max_value: 120
    step: 1
    lambda: "return x - 40;"
    write_lambda: "return x + 40;"

  # 0x000D — Fan full-speed temperature (read/write, +40 offset)
  # Raw range: 0x0014–0x00A0 (20–160), display: -20°C to 120°C
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Full Speed Temperature"
    register_type: holding
    address: 0x000D
    value_type: U_WORD
    unit_of_measurement: "°C"
    min_value: -20
    max_value: 120
    step: 1
    lambda: "return x - 40;"
    write_lambda: "return x + 40;"


# ── Binary sensors (bitmask read-only) ────────────────────────────────────────

binary_sensor:
  # 0x0001 — Fan running status (1=running, 0=stopped)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 1 Running"
    register_type: holding
    address: 0x0001
    bitmask: 0x0001
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 2 Running"
    register_type: holding
    address: 0x0001
    bitmask: 0x0002
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 3 Running"
    register_type: holding
    address: 0x0001
    bitmask: 0x0004
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 4 Running"
    register_type: holding
    address: 0x0001
    bitmask: 0x0008

  # 0x000E — Fan fault status (1=OK, 0=fault per manual)
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 1 OK"
    register_type: holding
    address: 0x000E
    bitmask: 0x0001
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 2 OK"
    register_type: holding
    address: 0x000E
    bitmask: 0x0002
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 3 OK"
    register_type: holding
    address: 0x000E
    bitmask: 0x0004
  - platform: modbus_controller
    modbus_controller_id: ${device_id}_modbus
    name: "${name} Fan 4 OK"
    register_type: holding
    address: 0x000E
    bitmask: 0x0008

# ── Select (template wrappers) ────────────────────────────────────────────────

select:
  - platform: template
    name: "${name} Governor Mode"
    entity_category: config
    optimistic: false
    options:
      - "Off"
      - "Min Speed"
    lambda: |-
      const int v = (int) id(${device_id}_governor_raw).state;
      if (v == 0) return std::string("Off");
      return std::string("Min Speed");
    set_action:
      - lambda: |-
          int val = (x == "Min Speed") ? 1 : 0;
          auto call = id(${device_id}_governor_raw).make_call();
          call.set_value(val);
          call.perform();

  - platform: template
    name: "${name} PWM Frequency"
    entity_category: config
    optimistic: false
    options:
      - "500Hz"
      - "1kHz"
      - "2kHz"
      - "5kHz"
      - "10kHz"
      - "25kHz"
    lambda: |-
      const int v = (int) id(${device_id}_pwm_freq_raw).state;
      switch (v) {
        case 0: return std::string("500Hz");
        case 1: return std::string("1kHz");
        case 2: return std::string("2kHz");
        case 3: return std::string("5kHz");
        case 4: return std::string("10kHz");
        case 5: return std::string("25kHz");
        default: return std::string("25kHz");
      }
    set_action:
      - lambda: |-
          int val = 5;
          if (x == "500Hz") val = 0;
          else if (x == "1kHz") val = 1;
          else if (x == "2kHz") val = 2;
          else if (x == "5kHz") val = 3;
          else if (x == "10kHz") val = 4;
          else val = 5;
          auto call = id(${device_id}_pwm_freq_raw).make_call();
          call.set_value(val);
          call.perform();

# ── Switches ──────────────────────────────────────────────────────────────────

switch:
  # Auto/Manual mode toggle. ON  = JPF4816 temperature-PID active (0xFFFF).
  #                         OFF = manual mode, fan forced to 10% (0x000A).
  # State is mirrored from the NVS-backed global, so the UI stays consistent
  # across reboots and across multiple HA sessions.
  - platform: template
    name: "${name} Auto Mode"
    id: ${device_id}_auto_switch
    icon: "mdi:fan-auto"
    optimistic: false
    lambda: "return id(${device_id}_auto_mode);"
    turn_on_action:
      - globals.set:
          id: ${device_id}_auto_mode
          value: "true"
      - lambda: |-
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
            id(${device_id}_modbus), 0x0003, (uint16_t) 0xFFFF);
          id(${device_id}_modbus)->queue_command(cmd);
    turn_off_action:
      - globals.set:
          id: ${device_id}_auto_mode
          value: "false"
      - lambda: |-
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
            id(${device_id}_modbus), 0x0003, (uint16_t) 0x000A);
          id(${device_id}_modbus)->queue_command(cmd);

# ── Buttons (actions) ─────────────────────────────────────────────────────────

button:
  # Write 0x00AA to 0x0020 — reset/restart the controller (write-only register)
  - platform: template
    name: "${name} Restart Device"
    on_press:
      - lambda: |-
          auto cmd = esphome::modbus_controller::ModbusCommandItem::create_write_single_command(
            id(${device_id}_modbus), 0x0020, 0x00AA);
          id(${device_id}_modbus)->queue_command(cmd);
