defaults:
  serial_port_speed: "9600"

# PCB silkscreen for RX/TX is swapped/wrong; GPIO20=RX / GPIO21=TX is the verified-correct mapping
uart:
  id: uart_modbus_client
  tx_pin: 21
  rx_pin: 20
  baud_rate: ${serial_port_speed}
  # Hardware RS485 half-duplex flow control (ESP32-only feature). Must live on the
  # uart: component, not modbus:, so the DE/RE toggle is timed by the UART hardware
  # against actual byte transmission instead of a fixed-delay software GPIO toggle.
  # With it on modbus:, responses were being clipped to 1-9 garbled bytes on every
  # poll (both slave addresses), consistent with the driver switching back to RX
  # too early/late relative to the real TX completion.
  flow_control_pin: 9

modbus:
  send_wait_time: 200ms
  id: modbus_master
